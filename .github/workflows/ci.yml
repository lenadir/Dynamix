name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Dynamix.sln

      - name: Build
        run: dotnet build Dynamix.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Dynamix.sln --configuration Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish src/Erp.Api/Erp.Api.csproj -c Release -o ./artifacts/api --no-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erp-api
          path: ./artifacts/api
